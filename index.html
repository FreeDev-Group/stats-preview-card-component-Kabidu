<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Stats preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <main class="card">
    <section class="card__content">
      <h1 class="card__title">Get insights that help your business grow.</h1>
      <p class="card__description">
        Discover the benefits of data analytics and make better decisions regarding revenue, 
        customer experience, and overall efficiency.
      </p>
      <div class="card__stats">
        <div class="stat">
          <span class="stat__number">10k+</span>
          <span class="stat__label">companies</span>
        </div>
        <div class="stat">
          <span class="stat__number">314</span>
          <span class="stat__label">templates</span>
        </div>
        <div class="stat">
          <span class="stat__number">12m+</span>
          <span class="stat__label">queries</span>
        </div>
      </div>
    </section>

    <section class="card__image">
      <img src="./images/image-header-desktop.jpg" alt="Business team working">
    </section>
  </main>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Kabidu Munguakonkwa Sage</a>.
  </div>
</body>
</html>
